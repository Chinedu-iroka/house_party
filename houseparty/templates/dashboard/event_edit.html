{% extends 'dashboard/base_dashboard.html' %}

{% block title %}Edit {{ event.name }} — Admin{% endblock %}

{% block content %}
<div class="dash-header">
  <div>
    <a href="{% url 'admin_event_detail' event.id %}" class="back-link">← Back to event</a>
    <h1 class="dash-title" style="margin-top:0.5rem;">Edit Event</h1>
  </div>
</div>

<form method="POST" action="{% url 'admin_event_edit' event.id %}" class="dash-form">
  {% csrf_token %}

  <div class="dash-form-section">
    <div class="form-group">
      <label class="form-label">Event Name</label>
      <input type="text" name="name" class="form-control" value="{{ event.name }}" />
      {% if errors.name %}<p class="form-error">{{ errors.name }}</p>{% endif %}
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea name="description" class="form-control" rows="4">{{ event.description }}</textarea>
    </div>
    <div class="dash-form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" name="date" class="form-control" value="{{ event.date|date:'Y-m-d' }}" />
      </div>
      <div class="form-group">
        <label class="form-label">Start Time</label>
        <input type="time" name="start_time" class="form-control" value="{{ event.start_time|time:'H:i' }}" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Public Zone</label>
      <input type="text" name="zone" class="form-control" value="{{ event.zone }}" />
    </div>
    <div class="form-group">
      <label class="form-label">Full Address <span class="text-muted">(Private)</span></label>
      <textarea name="full_address" class="form-control" rows="2">{{ event.full_address }}</textarea>
    </div>
  </div>

  <button type="submit" class="btn btn-gold">Save Changes</button>
</form>
{% endblock %}
